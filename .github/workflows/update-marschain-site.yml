name: Update MarsChain Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-marschain-site.yml"
      - "build_frontend_dashboard.py"
      - "deploy_to_oss.py"
      - "refresh_site.py"
      - "requirements.txt"
  schedule:
    - cron: "0 */5 * * *"

permissions:
  contents: read

concurrency:
  group: marschain-site
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
      ALIYUN_SITE_BASE_URL: ${{ secrets.ALIYUN_SITE_BASE_URL }}
      BAIDU_TONGJI_SITE_ID: ${{ secrets.BAIDU_TONGJI_SITE_ID }}
      MICROSOFT_CLARITY_PROJECT_ID: ${{ secrets.MICROSOFT_CLARITY_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore crawler cache
        uses: actions/cache/restore@v4
        with:
          path: output/marschain_power_cache.json
          key: marschain-power-cache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            marschain-power-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh site with 80% coverage rule
        run: |
          python refresh_site.py --coverage-target 0.80 --output-dir output --site-dir site

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marschain-site-build
          path: |
            site
            output/latest
            output/history
          if-no-files-found: error

      - name: Save crawler cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/marschain_power_cache.json
          key: marschain-power-cache-${{ runner.os }}-${{ github.ref_name }}

      - name: Deploy site to Alibaba Cloud OSS
        run: |
          SITE_BASE_URL="${ALIYUN_SITE_BASE_URL:-https://www.marschainrank.com}"
          python deploy_to_oss.py \
            --site-dir site \
            --bucket "$ALIYUN_OSS_BUCKET" \
            --endpoint "$ALIYUN_OSS_ENDPOINT" \
            --base-url "$SITE_BASE_URL" \
            --prefix "${ALIYUN_OSS_PREFIX:-}" \
            --allow-bucket-root
