# Runs every 5 minutes from Beijing 08:05 to 09:00.
# Preflight skips duplicate crawls once today's 08:00 window has been collected.
name: Update MarsChain Site

on:
  workflow_dispatch:
    inputs:
      site_only:
        description: "Rebuild and deploy the site shell from current public data"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-marschain-site.yml"
      - "build_frontend_dashboard.py"
      - "backfill_metric_history.py"
      - "deploy_to_oss.py"
      - "marschain_power_rank.py"
      - "paid_download_service.py"
      - "price_data.py"
      - "refresh_site.py"
      - "requirements.txt"
  schedule:
    - cron: "5-55/5 0 * * *"
    - cron: "0 1 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: marschain-site
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
      ALIYUN_PAID_OSS_BUCKET: ${{ secrets.ALIYUN_PAID_OSS_BUCKET }}
      ALIYUN_PAID_OSS_ENDPOINT: ${{ secrets.ALIYUN_PAID_OSS_ENDPOINT }}
      ALIYUN_PAID_OSS_PREFIX: ${{ secrets.ALIYUN_PAID_OSS_PREFIX }}
      ALIYUN_SITE_BASE_URL: ${{ secrets.ALIYUN_SITE_BASE_URL }}
      MARSCHAIN_PAID_DOWNLOAD_API_BASE: ${{ secrets.MARSCHAIN_PAID_DOWNLOAD_API_BASE }}
      BAIDU_TONGJI_SITE_ID: 1dc172d16803cd4223b85645006548b4
      MICROSOFT_CLARITY_PROJECT_ID: ${{ secrets.MICROSOFT_CLARITY_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight schedule guard
        id: preflight
        if: ${{ github.event_name == 'schedule' }}
        run: |
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.request

          origin = "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com"
          try:
              with urllib.request.urlopen(f"{origin}/data/latest.json?v=preflight", timeout=30) as resp:
                  payload = json.load(resp)
          except Exception as exc:
              print(f"preflight fetch failed: {exc}")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("skip_refresh=false\n")
              raise SystemExit(0)

          meta = payload.get("meta") or {}
          now_utc = dt.datetime.now(dt.timezone.utc)
          now_beijing = now_utc.astimezone(dt.timezone(dt.timedelta(hours=8)))
          expected_end = now_beijing.replace(hour=8, minute=0, second=0, microsecond=0)
          expected_end_ts = int(expected_end.timestamp())
          latest_end_ts = meta.get("statistics_window_end_timestamp")
          print(f"latest_end_ts={latest_end_ts} expected_end_ts={expected_end_ts}")
          if isinstance(latest_end_ts, int) and latest_end_ts >= expected_end_ts:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("skip_refresh=true\n")
              print("skip_refresh=true")
          else:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("skip_refresh=false\n")
              print("skip_refresh=false")
          PY

      - name: Setup Python
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore crawler cache
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: output/marschain_power_cache.json
          key: marschain-power-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            marschain-power-cache-${{ runner.os }}-${{ github.ref_name }}-
            marschain-power-cache-${{ runner.os }}-

      - name: Install dependencies
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preserve paid download API base
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' && env.MARSCHAIN_PAID_DOWNLOAD_API_BASE == '' }}
        run: |
          SITE_BASE_URL="${ALIYUN_SITE_BASE_URL:-https://www.marschainrank.com}"
          python - <<'PY' >> "$GITHUB_ENV"
          import html
          import os
          import re
          import urllib.request

          base = (os.environ.get("ALIYUN_SITE_BASE_URL") or "https://www.marschainrank.com").rstrip("/")
          try:
              with urllib.request.urlopen(f"{base}/?v=paid-api-preserve", timeout=30) as resp:
                  page = resp.read().decode("utf-8", "replace")
          except Exception:
              raise SystemExit(0)

          match = re.search(r'data-api-base="([^"]+)"', page)
          if match:
              api_base = html.unescape(match.group(1)).strip()
              if api_base:
                  print(f"MARSCHAIN_PAID_DOWNLOAD_API_BASE={api_base}")
          PY

      - name: Restore public metric history
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        run: |
          python - <<'PY'
          import urllib.request
          from pathlib import Path

          origin = "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com"
          data_dir = Path("site/data")
          data_dir.mkdir(parents=True, exist_ok=True)
          for name in ("metric-history.json", "price.json"):
              target = data_dir / name
              try:
                  with urllib.request.urlopen(f"{origin}/data/{name}?v=restore", timeout=30) as resp:
                      target.write_bytes(resp.read())
                      print(f"restored {target}")
              except Exception as exc:
                  print(f"{name} restore skipped: {exc}")
          PY

      - name: Backfill metric history from recent artifacts
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python backfill_metric_history.py --site-dir site --repo "$GITHUB_REPOSITORY" --max-runs 10

      - name: Refresh site with best-effort coverage
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' && !((github.event_name == 'push' && contains(github.event.head_commit.message, '[site-only]')) || (github.event_name == 'workflow_dispatch' && inputs.site_only == 'true')) }}
        run: |
          python refresh_site.py --coverage-target 0.80 --output-dir output --site-dir site

      - name: Rebuild site shell from current public data
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' && ((github.event_name == 'push' && contains(github.event.head_commit.message, '[site-only]')) || (github.event_name == 'workflow_dispatch' && inputs.site_only == 'true')) }}
        run: |
          python - <<'PY'
          import json
          import shutil
          import urllib.request
          from pathlib import Path

          from build_frontend_dashboard import build_html, build_mobile_html
          from price_data import build_price_payload_from_meta
          from refresh_site import build_metric_trends, normalize_metric_history

          origin = "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com"
          with urllib.request.urlopen(f"{origin}/data/latest.json", timeout=60) as resp:
              payload = json.load(resp)
          try:
              with urllib.request.urlopen(f"{origin}/build-meta.json", timeout=60) as resp:
                  build_meta = json.load(resp)
          except Exception:
              build_meta = payload.get("meta", {})
          try:
              with urllib.request.urlopen(f"{origin}/data/price.json?v=restore", timeout=30) as resp:
                  price_payload = json.load(resp)
          except Exception:
              price_payload = build_price_payload_from_meta(payload.get("meta", {}))

          site_dir = Path("site")
          data_dir = site_dir / "data"
          mobile_dir = site_dir / "m"
          output_latest_dir = Path("output/latest")
          output_history_dir = Path("output/history")
          data_dir.mkdir(parents=True, exist_ok=True)
          mobile_dir.mkdir(parents=True, exist_ok=True)
          output_latest_dir.mkdir(parents=True, exist_ok=True)
          output_history_dir.mkdir(parents=True, exist_ok=True)
          downloads_dir = site_dir / "downloads"
          if downloads_dir.exists():
              shutil.rmtree(downloads_dir)
          metric_history_path = data_dir / "metric-history.json"
          metric_history = []
          if metric_history_path.exists():
              try:
                  metric_history = normalize_metric_history(json.loads(metric_history_path.read_text()))
              except Exception:
                  metric_history = []
          payload["meta"]["metric_trends"] = build_metric_trends(payload.get("meta", {}), metric_history)
          (site_dir / "index.html").write_text(build_html(payload))
          (mobile_dir / "index.html").write_text(build_mobile_html(payload))
          (data_dir / "latest.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n")
          (data_dir / "metric-history.json").write_text(json.dumps({"snapshots": metric_history}, ensure_ascii=False, indent=2) + "\n")
          (data_dir / "price.json").write_text(json.dumps(price_payload, ensure_ascii=False, indent=2) + "\n")
          (site_dir / "build-meta.json").write_text(json.dumps(build_meta, ensure_ascii=False, indent=2) + "\n")
          (site_dir / "robots.txt").write_text("User-agent: *\nAllow: /\n")
          (output_latest_dir / "latest.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n")
          (output_latest_dir / "build-meta.json").write_text(json.dumps(build_meta, ensure_ascii=False, indent=2) + "\n")
          (output_history_dir / ".site-only").write_text("site-only build\n")
          PY

      - name: Rebuild and verify frontend shell
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        run: |
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path

          from build_frontend_dashboard import build_html, build_mobile_html
          from price_data import build_price_payload_from_meta, load_price_file
          from refresh_site import build_metric_trends, normalize_metric_history

          site_dir = Path("site")
          data_dir = site_dir / "data"
          mobile_dir = site_dir / "m"
          output_latest_dir = Path("output/latest")
          output_history_dir = Path("output/history")
          payload_path = data_dir / "latest.json"
          if not payload_path.exists():
              payload_path = output_latest_dir / "latest.json"
          payload = json.loads(payload_path.read_text(encoding="utf-8"))

          metric_history = []
          metric_history_path = data_dir / "metric-history.json"
          if metric_history_path.exists():
              try:
                  metric_history = normalize_metric_history(json.loads(metric_history_path.read_text(encoding="utf-8")))
              except Exception:
                  metric_history = []
          payload.setdefault("meta", {})["metric_trends"] = build_metric_trends(payload.get("meta", {}), metric_history)

          price_payload = load_price_file(data_dir / "price.json")
          if not price_payload:
              price_payload = build_price_payload_from_meta(payload.get("meta", {}))

          site_dir.mkdir(parents=True, exist_ok=True)
          data_dir.mkdir(parents=True, exist_ok=True)
          mobile_dir.mkdir(parents=True, exist_ok=True)
          output_latest_dir.mkdir(parents=True, exist_ok=True)
          output_history_dir.mkdir(parents=True, exist_ok=True)
          downloads_dir = site_dir / "downloads"
          if downloads_dir.exists():
              shutil.rmtree(downloads_dir)

          desktop_html = build_html(payload)
          mobile_html = build_mobile_html(payload)
          required_markers = [
              "data-share-poster",
              "data-live-highest-price",
              "data-live-oracle-trigger-price",
              "SHARE POSTER",
              "MarsChain 火星快报",
              "申请 Mars 工作室",
              "联系 QQ：3407186257",
              "日交易数量",
              "每日交易币量",
              "每日交易笔数",
              "选中日期",
              "区间最低",
              "区间最高",
              "footer-marquee",
              "数据来源：官方浏览器 / POWER合约 / MarsChain Rank",
          ]
          missing = [marker for marker in required_markers if marker not in desktop_html]
          forbidden = [marker for marker in ("MarsChain 今日算力战报", "数据来源：MarsChain Rank / explorer.marschain.net") if marker in desktop_html]
          if missing or forbidden:
              raise SystemExit(f"frontend shell verification failed: missing={missing}, forbidden={forbidden}")

          (site_dir / "index.html").write_text(desktop_html, encoding="utf-8")
          (mobile_dir / "index.html").write_text(mobile_html, encoding="utf-8")
          (data_dir / "latest.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          (data_dir / "metric-history.json").write_text(json.dumps({"snapshots": metric_history}, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          (data_dir / "price.json").write_text(json.dumps(price_payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          (site_dir / "robots.txt").write_text("User-agent: *\nAllow: /\n", encoding="utf-8")
          (output_latest_dir / "latest.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload build artifacts
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: marschain-site-build
          path: |
            site
            output/latest
            output/history
          if-no-files-found: error

      - name: Save crawler cache
        if: ${{ always() && steps.preflight.outputs.skip_refresh != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: output/marschain_power_cache.json
          key: marschain-power-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Deploy site to Alibaba Cloud OSS
        if: ${{ steps.preflight.outputs.skip_refresh != 'true' }}
        run: |
          SITE_BASE_URL="${ALIYUN_SITE_BASE_URL:-https://www.marschainrank.com}"
          python deploy_to_oss.py \
            --site-dir site \
            --bucket "$ALIYUN_OSS_BUCKET" \
            --endpoint "$ALIYUN_OSS_ENDPOINT" \
            --base-url "$SITE_BASE_URL" \
            --prefix "${ALIYUN_OSS_PREFIX:-}" \
            --allow-bucket-root
