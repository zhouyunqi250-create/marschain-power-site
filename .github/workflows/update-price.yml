name: Update MarsChain Price

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: marschain-price
  cancel-in-progress: true

jobs:
  update-price:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
      ALIYUN_SITE_BASE_URL: ${{ secrets.ALIYUN_SITE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update price when changed
        run: |
          SITE_BASE_URL="${ALIYUN_SITE_BASE_URL:-https://www.marschainrank.com}"
          python update_price.py \
            --site-base-url "$SITE_BASE_URL" \
            --bucket "$ALIYUN_OSS_BUCKET" \
            --endpoint "$ALIYUN_OSS_ENDPOINT" \
            --prefix "${ALIYUN_OSS_PREFIX:-}" \
            --allow-bucket-root

      - name: Watchdog trigger daily site refresh
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          branch = os.environ.get("GITHUB_REF_NAME") or "main"
          origin = "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com"
          api_root = f"https://api.github.com/repos/{repo}/actions"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "MarsChainRankDailyWatchdog/1.0",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          now_utc = dt.datetime.now(dt.timezone.utc)
          now_beijing = now_utc.astimezone(dt.timezone(dt.timedelta(hours=8)))
          minute_of_day = now_beijing.hour * 60 + now_beijing.minute
          if not (7 * 60 + 55 <= minute_of_day <= 9 * 60 + 30):
              print(f"outside daily watchdog window: {now_beijing:%Y-%m-%d %H:%M:%S}")
              raise SystemExit(0)

          fast_prewarm = now_beijing.replace(hour=7, minute=58, second=0, microsecond=0)
          if now_beijing < fast_prewarm:
              wait_seconds = int((fast_prewarm - now_beijing).total_seconds())
              print(f"early watchdog trigger; waiting {wait_seconds}s until Beijing 07:58 prewarm.")
              import time
              time.sleep(wait_seconds)
              now_utc = dt.datetime.now(dt.timezone.utc)
              now_beijing = now_utc.astimezone(dt.timezone(dt.timedelta(hours=8)))
              minute_of_day = now_beijing.hour * 60 + now_beijing.minute

          expected_end = now_beijing.replace(hour=8, minute=0, second=0, microsecond=0)
          expected_end_ts = int(expected_end.timestamp())
          meta = {}
          try:
              request = urllib.request.Request(
                  f"{origin}/data/latest.json?v=watchdog-{int(now_utc.timestamp())}",
                  headers={"Cache-Control": "no-cache", "Pragma": "no-cache"},
              )
              with urllib.request.urlopen(request, timeout=45) as response:
                  meta = (json.loads(response.read().decode("utf-8")).get("meta") or {})
          except Exception as exc:
              print(f"latest.json check failed; watchdog will try recovery: {exc}")

          def fresh_timestamp(value):
              return isinstance(value, int) and value >= expected_end_ts

          fast_fresh = fresh_timestamp(meta.get("statistics_window_end_timestamp"))
          full_fresh = fresh_timestamp(meta.get("full_scan_statistics_window_end_timestamp"))
          print(
              "watchdog "
              f"beijing={now_beijing:%Y-%m-%d %H:%M:%S} "
              f"expected_end_ts={expected_end_ts} "
              f"statistics_window_end_timestamp={meta.get('statistics_window_end_timestamp')} "
              f"full_scan_statistics_window_end_timestamp={meta.get('full_scan_statistics_window_end_timestamp')}"
          )

          def github_json(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=45) as response:
                  return json.loads(response.read().decode("utf-8"))

          def workflow_active(workflow_file):
              url = f"{api_root}/workflows/{workflow_file}/runs?branch={branch}&per_page=10"
              try:
                  payload = github_json(url)
              except Exception as exc:
                  print(f"failed to inspect {workflow_file}: {exc}")
                  return False
              active_statuses = {"queued", "in_progress", "waiting", "requested", "pending"}
              return any(run.get("status") in active_statuses for run in payload.get("workflow_runs", []))

          def dispatch(workflow_file, inputs=None):
              if workflow_active(workflow_file):
                  print(f"{workflow_file} already active; skip dispatch.")
                  return
              body = {"ref": branch}
              if inputs:
                  body["inputs"] = inputs
              data = json.dumps(body).encode("utf-8")
              request = urllib.request.Request(
                  f"{api_root}/workflows/{workflow_file}/dispatches",
                  data=data,
                  headers={**headers, "Content-Type": "application/json"},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(request, timeout=45) as response:
                      response.read()
                  print(f"dispatched {workflow_file}")
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", "replace")
                  raise SystemExit(f"dispatch {workflow_file} failed: HTTP {exc.code} {detail}") from exc

          if not fast_fresh:
              dispatch("fast-update-marschain-site.yml")

          if minute_of_day >= 8 * 60 + 6 and not full_fresh:
              dispatch("update-marschain-site.yml", {"site_only": "false"})
          PY

      - name: Watchdog recover outdated site shell
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          branch = os.environ.get("GITHUB_REF_NAME") or "main"
          origin = "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com"
          api_root = f"https://api.github.com/repos/{repo}/actions"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "MarsChainRankShellWatchdog/1.0",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          required = {
              "index.html": (
                  "data-share-poster",
                  "powerPerCoinDelta",
                  "oneYiOutputDelta",
                  "data-live-highest-price",
                  "data-live-oracle-trigger-price",
              ),
              "m/index.html": (
                  "data-share-poster",
                  "data-live-highest-price",
                  "data-live-oracle-trigger-price",
              ),
          }
          forbidden = (
              "\u6bcf 5 \u5c0f\u65f6\u5237\u65b0",
              "\u5237\u65b0\u9891\u7387\uff1a\u6bcf 5 \u5c0f\u65f6",
              "Every 5 Hours",
              "refreshes every 5 hours",
          )

          shell_current = True
          details = []
          for path, markers in required.items():
              try:
                  url = f"{origin}/{path}?v=shell-watchdog-{int(time.time())}"
                  request = urllib.request.Request(url, headers={"Cache-Control": "no-cache", "Pragma": "no-cache"})
                  with urllib.request.urlopen(request, timeout=45) as response:
                      text = response.read().decode("utf-8", "replace")
                  missing = [marker for marker in markers if marker not in text]
                  bad = [marker for marker in forbidden if marker in text]
              except Exception as exc:
                  missing = ["fetch_failed"]
                  bad = [str(exc)]
              if missing or bad:
                  shell_current = False
                  details.append({"path": path, "missing": missing, "forbidden": bad})

          if shell_current:
              print("site shell is current; no recovery dispatch needed.")
              raise SystemExit(0)

          print(f"outdated site shell detected: {details}")

          def github_json(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=45) as response:
                  return json.loads(response.read().decode("utf-8"))

          def workflow_active(workflow_file):
              url = f"{api_root}/workflows/{workflow_file}/runs?branch={branch}&per_page=10"
              try:
                  payload = github_json(url)
              except Exception as exc:
                  print(f"failed to inspect {workflow_file}: {exc}")
                  return False
              active_statuses = {"queued", "in_progress", "waiting", "requested", "pending"}
              return any(run.get("status") in active_statuses for run in payload.get("workflow_runs", []))

          if workflow_active("update-marschain-site.yml"):
              print("update-marschain-site.yml already active; skip recovery dispatch.")
              raise SystemExit(0)

          body = {"ref": branch, "inputs": {"site_only": "false"}}
          request = urllib.request.Request(
              f"{api_root}/workflows/update-marschain-site.yml/dispatches",
              data=json.dumps(body).encode("utf-8"),
              headers={**headers, "Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=45) as response:
                  response.read()
              print("dispatched update-marschain-site.yml to recover current site shell.")
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", "replace")
              raise SystemExit(f"shell recovery dispatch failed: HTTP {exc.code} {detail}") from exc
          PY
