# Prewarms at Beijing 07:58, waits until the 08:00 cutoff, then publishes the
# official snapshot as quickly as possible. Extra 08:00-08:15 schedules are
# lightweight fallbacks; preflight skips duplicates once today's snapshot lands.
name: Fast Update MarsChain Site

on:
  workflow_dispatch:
  schedule:
    - cron: "58 23 * * *"
    - cron: "0,2,5,8,10,15 0 * * *"

permissions:
  contents: read

concurrency:
  group: marschain-site
  cancel-in-progress: false

jobs:
  fast-update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
      ALIYUN_PAID_OSS_BUCKET: ${{ secrets.ALIYUN_PAID_OSS_BUCKET }}
      ALIYUN_PAID_OSS_ENDPOINT: ${{ secrets.ALIYUN_PAID_OSS_ENDPOINT }}
      ALIYUN_PAID_OSS_PREFIX: ${{ secrets.ALIYUN_PAID_OSS_PREFIX }}
      ALIYUN_SITE_BASE_URL: ${{ secrets.ALIYUN_SITE_BASE_URL }}
      MARSCHAIN_PAID_DOWNLOAD_API_BASE: ${{ secrets.MARSCHAIN_PAID_DOWNLOAD_API_BASE }}
      BAIDU_TONGJI_SITE_ID: 1dc172d16803cd4223b85645006548b4
      MICROSOFT_CLARITY_PROJECT_ID: ${{ secrets.MICROSOFT_CLARITY_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight fast update guard
        id: preflight
        if: ${{ github.event_name == 'schedule' }}
        run: |
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.request

          now_utc = dt.datetime.now(dt.timezone.utc)
          now_beijing = now_utc.astimezone(dt.timezone(dt.timedelta(hours=8)))
          expected_end = now_beijing.replace(hour=8, minute=0, second=0, microsecond=0)
          expected_end_ts = int(expected_end.timestamp())
          origin = "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com"
          url = f"{origin}/data/latest.json?v={int(now_utc.timestamp())}"
          latest_end_ts = None
          try:
              request = urllib.request.Request(url, headers={"Cache-Control": "no-cache", "Pragma": "no-cache"})
              with urllib.request.urlopen(request, timeout=45) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              meta = payload.get("meta") or {}
              latest_end_ts = meta.get("statistics_window_end_timestamp")
          except Exception as exc:
              print(f"preflight fetch failed, continue fast update: {exc}")

          required_shell_markers = (
              "data-share-poster",
              "powerPerCoinDelta",
              "oneYiOutputDelta",
              "data-live-highest-price",
              "data-live-oracle-trigger-price",
          )
          forbidden_shell_markers = (
              "\u6bcf 5 \u5c0f\u65f6\u5237\u65b0",
              "\u5237\u65b0\u9891\u7387\uff1a\u6bcf 5 \u5c0f\u65f6",
              "Every 5 Hours",
              "refreshes every 5 hours",
          )
          shell_current = False
          try:
              shell_url = f"{origin}/index.html?v=fast-preflight-shell-{int(now_utc.timestamp())}"
              request = urllib.request.Request(shell_url, headers={"Cache-Control": "no-cache", "Pragma": "no-cache"})
              with urllib.request.urlopen(request, timeout=30) as response:
                  shell = response.read().decode("utf-8", "replace")
              shell_current = all(marker in shell for marker in required_shell_markers) and not any(
                  marker in shell for marker in forbidden_shell_markers
              )
          except Exception as exc:
              print(f"shell preflight fetch failed, continue fast update: {exc}")

          latest_fresh = isinstance(latest_end_ts, int) and latest_end_ts >= expected_end_ts
          print(
              f"latest_end_ts={latest_end_ts} expected_end_ts={expected_end_ts} "
              f"latest_fresh={latest_fresh} shell_current={shell_current}"
          )
          if latest_fresh and shell_current:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("skip=true\n")
              print("Fast metrics already refreshed for today's 08:00 window; skip duplicate run.")
          PY

      - name: Setup Python
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Beijing 08:00 cutoff
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        run: |
          python3 - <<'PY'
          import datetime as dt
          import time

          now_utc = dt.datetime.now(dt.timezone.utc)
          now_beijing = now_utc.astimezone(dt.timezone(dt.timedelta(hours=8)))
          target = now_beijing.replace(hour=8, minute=0, second=5, microsecond=0)
          if now_beijing < target:
              wait_seconds = int((target - now_beijing).total_seconds())
              print(f"Waiting {wait_seconds}s for Beijing 08:00 official snapshot cutoff.")
              time.sleep(wait_seconds)
          else:
              print(f"Beijing 08:00 cutoff has passed: {now_beijing:%Y-%m-%d %H:%M:%S}.")
          PY

      - name: Fast refresh from official snapshot
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        run: |
          SITE_BASE_URL="${ALIYUN_SITE_BASE_URL:-https://www.marschainrank.com}"
          python fast_update_site.py \
            --site-dir site \
            --output-dir output \
            --origin "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com" \
            --rpc-url "https://rpcs.marschain.net" \
            --max-cutoff-lag-minutes 12

      - name: Verify fast refresh markers
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          from pathlib import Path

          payload = json.loads(Path("site/data/latest.json").read_text(encoding="utf-8"))
          meta = payload.get("meta") or {}
          now_utc = dt.datetime.now(dt.timezone.utc)
          now_beijing = now_utc.astimezone(dt.timezone(dt.timedelta(hours=8)))
          expected_end = now_beijing.replace(hour=8, minute=0, second=0, microsecond=0)
          expected_end_ts = int(expected_end.timestamp())
          checks = {
              "fast_metrics_ready": meta.get("fast_metrics_ready") is True,
              "fast_update_only": meta.get("fast_update_only") is True,
              "statistics_window_end_timestamp": meta.get("statistics_window_end_timestamp") == expected_end_ts,
              "network_total_power": meta.get("network_total_power") is not None,
              "network_total_burned_tokens": meta.get("network_total_burned_tokens") is not None,
              "explorer_total_addresses": meta.get("explorer_total_addresses") is not None,
              "today_new_power": meta.get("today_new_power") is not None,
              "today_burned_display": bool(meta.get("today_burned_display")),
          }
          missing = [name for name, ok in checks.items() if not ok]
          if missing:
              raise SystemExit(f"fast refresh verification failed: {missing}")
          PY

      - name: Deploy site to Alibaba Cloud OSS
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        run: |
          SITE_BASE_URL="${ALIYUN_SITE_BASE_URL:-https://www.marschainrank.com}"
          python deploy_to_oss.py \
            --site-dir site \
            --bucket "$ALIYUN_OSS_BUCKET" \
            --endpoint "$ALIYUN_OSS_ENDPOINT" \
            --base-url "$SITE_BASE_URL" \
            --prefix "${ALIYUN_OSS_PREFIX:-}" \
            --allow-bucket-root

      - name: Verify public OSS shell after deploy
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        run: |
          python - <<'PY'
          import time
          import urllib.request

          origin = "https://marschain-power-site-chu.oss-cn-hangzhou.aliyuncs.com"
          required = {
              "index.html": (
                  "data-share-poster",
                  "powerPerCoinDelta",
                  "oneYiOutputDelta",
                  "data-live-highest-price",
                  "data-live-oracle-trigger-price",
              ),
              "m/index.html": (
                  "data-share-poster",
                  "data-live-highest-price",
                  "data-live-oracle-trigger-price",
              ),
          }
          forbidden = (
              "\u6bcf 5 \u5c0f\u65f6\u5237\u65b0",
              "\u5237\u65b0\u9891\u7387\uff1a\u6bcf 5 \u5c0f\u65f6",
              "Every 5 Hours",
              "refreshes every 5 hours",
          )
          time.sleep(3)
          for path, markers in required.items():
              url = f"{origin}/{path}?v=verify-shell-{int(time.time())}"
              request = urllib.request.Request(url, headers={"Cache-Control": "no-cache", "Pragma": "no-cache"})
              with urllib.request.urlopen(request, timeout=45) as response:
                  text = response.read().decode("utf-8", "replace")
              missing = [marker for marker in markers if marker not in text]
              bad = [marker for marker in forbidden if marker in text]
              if missing or bad:
                  raise SystemExit(f"OSS shell verification failed for {path}: missing={missing}, forbidden={bad}")
          print("OSS shell verification passed.")
          PY
